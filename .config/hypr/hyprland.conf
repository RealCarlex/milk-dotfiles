exec = gsettings set org.gnome.desktop.interface gtk-theme "Milk-Outside-a-Bag-GTK-Theme-master"   # for GTK3 apps
exec = gsettings set org.gnome.desktop.interface color-scheme "Milk-Outside-a-Bag-of-Milk"   # for GTK4 apps

###############
### SOURCES ###
###############

source = ~/.config/hypr/plugins.conf
source = ~/.config/hypr/environment.conf
source = ~/.config/hypr/keybinds.conf

################
### MONITORS ###
################

monitor=eDP-1, 1920x1080@144, 0x0, 1

#################
### AUTOSTART ###
#################

exec-once = swww-daemon & swww restore
exec-once = hyprpm reload
exec-once = qs
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec = nwg-look -a

#####################
### LOOK AND FEEL ###
#####################

general {
    border_size = 5
    col.active_border = rgb(ac3231)
    col.inactive_border = rgb(52263e)

    gaps_in = 3
    gaps_out = 3
}

decoration {
    dim_inactive = false
    dim_strength = 0.15

    shadow {
        enabled = false
        range = 18
        render_power = 3
        color = rgba(000000aa)
	offset = 2, 2
    }

    blur {
        size = 2
        passes = 4
    }
}

animations {
    enabled = true
    workspace_wraparound = false

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     5,     default,      slide
    animation = workspacesIn,  1,     5,     default,      slide
    animation = workspacesOut, 1,     5,     default,      slide
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    force_split = 2
    pseudotile = true
    preserve_split = true
    split_width_multiplier = 1.5
}

misc {
    background_color = rgb(000000)
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
}


#############
### INPUT ###
#############

input {
    kb_layout = tr
    numlock_by_default = yes
    repeat_rate = 50
    repeat_delay = 300
    follow_mouse = 1

    touchpad {
        disable_while_typing = false
	natural_scroll = false
	tap-and-drag = true
   }
}

cursor {
    no_hardware_cursors = true
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule = float yes, match:class Bitwarden
windowrule = float yes, match:class io.ente.auth
